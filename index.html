<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff6b6b,#ff9ff3,#54a0ff,#5f27cd);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    padding:20px;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:30px 20px;
    text-align:center;
    color:white;
    width:100%;
    max-width:400px;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
    z-index:2;
}

.card h1{
    font-size:2.2rem;
    margin-bottom:10px;
}

.card p{
    font-size:1.1rem;
    line-height:1.6;
    margin-bottom:20px;
}

button{
    border:none;
    outline:none;
    padding:14px 25px;
    border-radius:50px;
    font-size:1rem;
    cursor:pointer;
    background:white;
    color:#ff4081;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden-message{
    margin-top:20px;
    display:none;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    z-index:1;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Mobile */
@media(max-width:480px){
    .card h1{
        font-size:1.8rem;
    }

    .card p{
        font-size:1rem;
    }

    button{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="card">
    <h1>🎂 Happy Birthday! 🎉</h1>

    <p>
        Wishing you a day filled with happiness,
        laughter, love, and unforgettable memories.
        May all your dreams come true! ✨
    </p>

    <button onclick="showWish()">
        Open Birthday Surprise 🎁
    </button>

    <div class="hidden-message" id="wish">
        <h2>🌟 Have an Amazing Year Ahead! 🌟</h2>
        <p>
            May your birthday be as wonderful,
            special, and beautiful as you are.
            Keep smiling and shining! 💖
        </p>
    </div>
</div>

<script>
function showWish(){
    document.getElementById("wish").style.display="block";
    launchConfetti();
}

function launchConfetti(){

    const colors=[
        "#ff4757",
        "#fffa65",
        "#2ed573",
        "#1e90ff",
        "#ff6b81",
        "#e056fd"
    ];

    for(let i=0;i<150;i++){

        const confetti=document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left=Math.random()*100+"vw";
        confetti.style.backgroundColor=
        colors[Math.floor(Math.random()*colors.length)];

        confetti.style.width=
        Math.random()*8+6+"px";

        confetti.style.height=
        Math.random()*8+6+"px";

        confetti.style.animationDuration=
        Math.random()*3+2+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}
</script>

</body>
</html>
